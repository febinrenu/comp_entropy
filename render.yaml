services:
  - type: web
    name: comp-ent-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:${PORT:-8000}
    envVars:
      - key: DATABASE_URL
        scope: run
      - key: SECRET_KEY
        scope: run
      - key: DEBUG
        value: "false"
      - key: PORT
        value: "8000"
      - key: ALLOWED_ORIGINS
        scope: run
